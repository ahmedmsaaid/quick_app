name: base_app
description: "Base Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1


dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1

  cupertino_icons: ^1.0.8
  # Flutter plugin for Firebase Core, enabling connecting to multiple Firebase apps.
  firebase_core: ^3.15.1
  # Pretty Dio logger is a Dio interceptor that logs network calls in a pretty, easy to read format.
  pretty_dio_logger: ^1.4.0
  # A powerful HTTP networking package, supports Interceptors, Aborting and canceling a request, Custom adapters, Transformers, etc.
  dio: ^5.8.0+1
  # Simple direct Service Locator that allows to decouple the interface from a concrete implementation and to access the concrete implementation from everywhere in your App
  # Flutter widgets that make it easy to implement the BLoC (Business Logic Component) design pattern. Built to be used with the bloc state management package.
  flutter_bloc: ^9.1.1
  # A Dart package that helps to implement value based equality without needing to explicitly override == and hashCode.
  equatable: ^2.0.7
  # A Flutter package for authenticating with Firebase.
  firebase_auth: ^5.6.2
  #Injectable is a convenient code generator for get_it. Inspired by Angular DI, Guice DI and inject.dart.
  # database written in pure Dart

  flutter_screenutil: ^5.9.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.14.4
  firebase_messaging: ^15.2.10
  font_awesome_flutter: ^10.7.0
  flutter_local_notifications: ^19.4.1
  retrofit: 4.9.0
  hive_ce: ^2.15.1
  hive_ce_generator: ^1.9.3
  hive_ce_flutter: ^2.3.3
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  riverpod: ^3.1.0
  shimmer: ^3.0.0
  easy_localization: ^3.0.8
  smooth_page_indicator: ^2.0.1
  flutter_svg: ^2.2.3
  country_picker: ^2.0.27
  flutter_otp_text_field: ^1.5.1+1
  image_picker: ^1.2.1
  lottie: ^3.3.2
  cached_network_svg_image: ^2.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^4.0.0+1
  flutter_native_splash: ^2.4.3
  flutter_lints: ^5.0.0
  retrofit_generator: 10.1.0
  build_runner: ^2.5.4
  json_serializable: ^6.9.0
  freezed: ^3.2.3
  easy_localization_loader:
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/style_image.png"


flutter:

  uses-material-design: true

  assets:
    - assets/translations/
    - assets/image/
    - assets/fonts/
    - assets/icons/
    - assets/animation/
    - assets/demo/





fonts:
  - family: Cairo
    fonts:
      - asset: assets/fonts/Cairo-Regular.ttf
      - asset: assets/fonts/Cairo-Medium.ttf
        weight: 500
      - asset: assets/fonts/Cairo-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Cairo-Bold.ttf
        weight: 700
      - asset: assets/fonts/Cairo-ExtraBold.ttf
        weight: 800
      - asset: assets/fonts/Cairo-Black.ttf
        weight: 900
      - asset: assets/fonts/Cairo-Light.ttf
        weight: 300
      - asset: assets/fonts/Cairo-ExtraLight.ttf
        weight: 200

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
flutter_native_splash:
  image: assets/image/style_image.png
  image_dark: assets/image/style_image_dark.png

  color: "#FFFFFF"
  color_dark: "#000000"
  # background_image: assets/images/splash_background.png

  # color_dark: "#000000"

  # Android 12+ splash screen
  android_12:
    image: assets/image/style_image.png
    image_dark: assets/image/style_image_dark.png
    color: "#FFFFFF"
    color_dark: "#000000"
    # icon_background_color: "#FF5722"

  android: true
  ios: true
  web: false

  # Fullscreen mode
  fullscreen: true

  android_gravity: center
  ios_content_mode: center
